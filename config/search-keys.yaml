# Provider metadata
metadata:
  tavily:
    endpoint: https://api.tavily.com/search
    method: POST
    auth_type: body
    free_tier: 1000
    rate_limit: 100
    strengths:
      - AI-synthesized answers
      - Structured snippets
      - Fast factual queries
    best_for:
      - factual queries
      - news
      - quick answers
      - AI summarization

  firecrawl:
    endpoint: https://api.firecrawl.dev/v2/scrape
    method: POST
    auth_type: header
    free_tier: 1000
    rate_limit: 50
    strengths:
      - Full page content extraction
      - Markdown output
      - Batch scraping (10+ URLs)
      - GitHub search
      - Academic search
    best_for:
      - deep content extraction
      - article scraping
      - documentation
      - GitHub/code search
      - batch operations

  tinyfish:
    endpoint: https://api.search.tinyfish.ai
    method: GET
    auth_type: header
    free_tier: unlimited
    rate_limit: 60
    strengths:
      - JS rendering
      - Bot bypass
      - SPA support
      - Dynamic content
    best_for:
      - JS-heavy sites
      - SPAs
      - bot-protected pages
      - dynamic content

  searxng:
    endpoint: http://localhost:8889/search
    method: GET
    auth_type: none
    free_tier: unlimited
    rate_limit: none
    strengths:
      - Metasearch (70+ engines)
      - No API key needed
      - Self-hosted
      - Privacy
    best_for:
      - broad search
      - cross-engine verification
      - fallback
      - unlimited queries
