name: cohere
type: llm
is_free: true
free_source: free_api_hunter
base_url: https://api.cohere.com/v1
auth:
  type: bearer
  header: Authorization
  prefix: 'Bearer '
rate_limit:
  tokens_per_month: 1000000
timeout: 30
retry:
  count: 3
  delay_ms: 1000
  backoff: exponential
models:
- id: command-r
  name: Command R
  type: chat
  max_tokens: 131072
- id: command-r-plus
  name: Command R+
  type: chat
  max_tokens: 131072
health_check:
  enabled: true
  interval_sec: 60
  endpoint: /models
