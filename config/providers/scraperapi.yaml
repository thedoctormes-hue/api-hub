name: scraperapi
type: scrape
base_url: https://api.scraperapi.com
auth:
  type: query_param
  param: api_key
rate_limit:
  requests_per_minute: 10
  requests_per_day: 1000
timeout: 30
retry:
  count: 2
  delay_ms: 1000
  backoff: linear
health_check:
  enabled: true
  interval_sec: 60
  endpoint: /
