name: openrouter
type: llm
base_url: https://openrouter.ai/api/v1
auth:
  type: bearer
  header: Authorization
  prefix: "Bearer "
rate_limit:
  requests_per_minute: 20
  requests_per_day: 200
timeout: 30
retry:
  count: 3
  delay_ms: 1000
  backoff: exponential
models:
  - id: openrouter/auto
    name: Auto
    type: chat
    max_tokens: 128000
health_check:
  enabled: true
  interval_sec: 15
  endpoint: /models
