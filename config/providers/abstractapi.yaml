name: abstractapi
type: validate
base_url: https://emailvalidation.abstractapi.com/v1
auth:
  type: query_param
  param: api_key
rate_limit:
  requests_per_minute: 10
  requests_per_day: 100
timeout: 10
retry:
  count: 2
  delay_ms: 500
  backoff: linear
health_check:
  enabled: true
  interval_sec: 60
  endpoint: /
